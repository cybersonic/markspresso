<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} · Markspresso</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  </head>
  <body>
    {{ include "partials/header.html" }}
    <main class="section">
      <div class="container">
        <div class="columns is-variable is-5">
          <aside class="column is-3">
            <div class="box">
              <p class="is-size-7 has-text-weight-semibold has-text-grey">Documentation</p>
              {{ navigation }}
            </div>
          </aside>
          <article class="column is-9">
            <div class="box">
              <h1 class="title is-3">{{ title }}</h1>
              {{#if description}}<p class="subtitle is-6">{{ description }}</p>{{/if}}
              <div>{{ content }}</div>
            </div>
          </article>
        </div>
      </div>
    </main>
    {{ include "partials/footer.html" }}
    {{ markspressoScripts }}
  </body>
</html>
