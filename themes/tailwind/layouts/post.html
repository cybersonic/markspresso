<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} · Markspresso</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-200 antialiased">
    {{ include "partials/header.html" }}
    <main class="mx-auto max-w-6xl px-6 py-10">
      <div class="grid grid-cols-1 gap-8 lg:grid-cols-[minmax(0,1fr)_280px]">
        <article class="rounded-xl border border-slate-800 bg-slate-900/40 p-6">
          <h1 class="text-3xl font-semibold text-white">{{ title }}</h1>
          {{#if date}}<p class="mt-2 text-sm text-slate-400">{{ date }}</p>{{/if}}
          <div class="prose prose-invert prose-slate mt-6 max-w-none">
            {{ content }}
          </div>
        </article>
        <aside class="rounded-xl border border-slate-800 bg-slate-900/50 p-4">
          <h2 class="mb-3 text-xs font-semibold uppercase tracking-widest text-slate-400">Recent</h2>
          <div class="text-sm">{{ posts_list }}</div>
        </aside>
      </div>
    </main>
    {{ include "partials/footer.html" }}
    {{ markspressoScripts }}
  </body>
</html>
