<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} · Markspresso</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-200 antialiased">
    {{ include "partials/header.html" }}
    <section class="border-b border-slate-800">
      <div class="mx-auto max-w-6xl px-6 py-16">
        <h1 class="text-4xl font-semibold tracking-tight text-white">{{ title }}</h1>
        {{#if description}}<p class="mt-3 max-w-3xl text-slate-400">{{ description }}</p>{{/if}}
      </div>
    </section>
    <main class="mx-auto max-w-6xl px-6 py-10">
      <article class="prose prose-invert prose-slate max-w-none">
        {{ content }}
      </article>
    </main>
    {{ include "partials/footer.html" }}
    {{ markspressoScripts }}
  </body>
</html>
