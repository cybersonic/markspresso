<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
      :root {
        --bg: #0b1020;
        --bg-accent: #111933;
        --bg-radial-left: #1f2a56;
        --bg-radial-right: #17395f;
        --presenter-bg: #050814;
        --presenter-panel-bg: #0a0f21;
        --presenter-pending-opacity: 0.7;
        --text: #f7f8fb;
        --muted: #aeb8d0;
        --accent: #6ee7ff;
        --accent-2: #60a5fa;
        --card: #111b36;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background:
          radial-gradient(circle at 10% 10%, var(--bg-radial-left) 0%, transparent 35%),
          radial-gradient(circle at 90% 10%, var(--bg-radial-right) 0%, transparent 35%),
          var(--bg);
        color: var(--text);
      }
      .deck-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }
      .deck-topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid rgba(255,255,255,0.12);
        background: rgba(8, 12, 26, 0.7);
        backdrop-filter: blur(4px);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .deck-title {
        font-size: 0.95rem;
        color: var(--muted);
      }
      .deck-counter {
        font-size: 0.9rem;
        color: var(--accent);
        font-weight: 600;
      }
      .deck-stage {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.25rem;
      }
      #deck {
        width: min(1200px, 96vw);
      }
      .slide {
        display: none;
        min-height: min(78vh, 760px);
        background: linear-gradient(155deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 20px;
        padding: clamp(1.4rem, 2.6vw, 2.4rem);
        padding-bottom: clamp(3.15rem, 5vw, 4.1rem);
        position: relative;
        box-shadow: 0 18px 45px rgba(0,0,0,0.35);
      }
      .slide.active { display: block; }
      .slide h1, .slide h2, .slide h3 {
        margin-top: 0;
        line-height: 1.2;
      }
      .slide h1 { font-size: clamp(2rem, 3.6vw, 3.1rem); }
      .slide h2 { font-size: clamp(1.45rem, 2.7vw, 2.2rem); color: var(--accent); }
      .slide p, .slide li {
        font-size: clamp(1rem, 1.5vw, 1.28rem);
        line-height: 1.55;
      }
      .slide ul, .slide ol {
        padding-left: 1.3rem;
      }
      .slide code {
        background: rgba(255,255,255,0.12);
        border-radius: 6px;
        padding: 0.12rem 0.3rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 1.03em;
      }
      .slide pre {
        background: #0a1329;
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 12px;
        padding: 0.85rem 1rem;
        overflow-x: auto;
      }
      .slide pre code {
        font-size: clamp(1.05rem, 1.4vw, 1.22rem);
        line-height: 1.45;
      }
      .slide pre code.code-lines-processed,
      .presenter-slide-content pre code.code-lines-processed {
        display: block;
        background: transparent;
        border-radius: 0;
        padding: 0;
      }
      .slide pre code.code-lines-processed .code-line,
      .presenter-slide-content pre code.code-lines-processed .code-line {
        display: block;
        padding: 0 0.3rem;
        border-radius: 6px;
      }
      .slide pre code.code-lines-processed .code-line.is-highlight,
      .presenter-slide-content pre code.code-lines-processed .code-line.is-highlight {
        background: rgba(110,231,255,0.16);
        box-shadow: inset 0 0 0 1px rgba(110,231,255,0.34);
      }
      .slide pre code.code-lines-processed .code-line.is-highlight.has-inline-highlight,
      .presenter-slide-content pre code.code-lines-processed .code-line.is-highlight.has-inline-highlight {
        background: transparent;
        box-shadow: none;
      }
      .slide pre code.code-lines-processed .code-line .code-line-highlight-span,
      .presenter-slide-content pre code.code-lines-processed .code-line .code-line-highlight-span {
        background: rgba(110,231,255,0.16);
        box-shadow: inset 0 0 0 1px rgba(110,231,255,0.34);
        border-radius: 4px;
      }
      .slide pre code.code-lines-processed .code-line.is-highlight.fragment-highlight-pending,
      .presenter-slide-content pre code.code-lines-processed .code-line.is-highlight.fragment-highlight-pending {
        background: transparent;
        box-shadow: none;
      }
      .slide pre code.code-lines-processed .code-line.has-inline-highlight.fragment-highlight-pending .code-line-highlight-span,
      .presenter-slide-content pre code.code-lines-processed .code-line.has-inline-highlight.fragment-highlight-pending .code-line-highlight-span {
        background: transparent;
        box-shadow: none;
      }
      .slide-two-col {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
        gap: 1rem;
        align-items: start;
      }
      .slide-two-col--right-40 {
        grid-template-columns: minmax(0, 3fr) minmax(0, 2fr);
      }
      .slide-two-col--left-40 {
        grid-template-columns: minmax(0, 2fr) minmax(0, 3fr);
      }
      .slide-two-col--left-40 .slide-two-col__left,
      .slide-two-col--left-40 .slide-two-col__text {
        grid-column: 2;
      }
      .slide-two-col--left-40 .slide-two-col__right,
      .slide-two-col--left-40 .slide-two-col__code {
        grid-column: 1;
      }
      .slide-two-col__left,
      .slide-two-col__right,
      .slide-two-col__text,
      .slide-two-col__code {
        min-width: 0;
      }
      .slide-two-col__code pre {
        margin: 0;
        max-height: min(64vh, 700px);
        overflow: auto;
      }
      @media (max-width: 980px) {
        .slide-two-col {
          grid-template-columns: 1fr;
        }
      }
      .slide blockquote {
        margin: 1rem 0;
        padding: 0.7rem 0.95rem;
        border-left: 4px solid var(--accent-2);
        background: var(--card);
        color: var(--muted);
      }
      .slide a { color: var(--accent); }
      .slide-footer {
        position: absolute;
        left: clamp(1.4rem, 2.6vw, 2.4rem);
        right: clamp(1.4rem, 2.6vw, 2.4rem);
        bottom: clamp(0.75rem, 1.7vw, 1.2rem);
        margin-top: 0;
        padding-top: 0.42rem;
        border-top: 1px solid rgba(255,255,255,0.18);
        color: var(--muted);
        font-size: clamp(0.82rem, 1.05vw, 0.96rem);
        line-height: 1.35;
        text-align: left;
      }
      .slide-footer a {
        color: var(--accent);
      }
      .deck-controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.6rem;
        padding: 0.7rem 1rem 1rem;
      }
      .deck-btn {
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.08);
        color: var(--text);
        border-radius: 10px;
        padding: 0.45rem 0.95rem;
        cursor: pointer;
        font-size: 0.92rem;
      }
      .deck-btn:hover { background: rgba(255,255,255,0.16); }
      .deck-help {
        text-align: center;
        font-size: 0.85rem;
        color: var(--muted);
        padding-bottom: 1rem;
      }
      .deck-global-footer {
        position: fixed;
        left: 0.85rem;
        bottom: 0.8rem;
        z-index: 24;
        max-width: calc(100vw - 7.5rem);
        font-size: 0.74rem;
        color: var(--muted);
        opacity: 0.78;
        letter-spacing: 0.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        pointer-events: none;
      }
      .deck-global-footer:empty {
        display: none;
      }
      .fragment-hidden {
        visibility: hidden;
      }
      .fragment-preview-pending {
        opacity: var(--presenter-pending-opacity, 0.7);
      }
      .presenter-slide-content .code-line.is-highlight.fragment-preview-pending {
        background: rgba(110,231,255,0.12);
        box-shadow: inset 0 0 0 1px rgba(110,231,255,0.26);
      }
      .speaker-note {
        display: none !important;
      }
      .deck-settings-toggle {
        position: fixed;
        right: 0.8rem;
        bottom: 0.8rem;
        z-index: 30;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(7, 10, 22, 0.72);
        color: var(--muted);
        border-radius: 999px;
        padding: 0.3rem 0.65rem;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        cursor: pointer;
        opacity: 0.58;
        transition: opacity 120ms ease, color 120ms ease, background 120ms ease;
      }
      .deck-settings-toggle:hover,
      .deck-settings-toggle[aria-expanded="true"] {
        opacity: 1;
        color: var(--text);
        background: rgba(14, 20, 42, 0.92);
      }
      .deck-settings-panel {
        position: fixed;
        right: 0.8rem;
        bottom: 2.9rem;
        z-index: 30;
        width: min(300px, calc(100vw - 1.6rem));
        padding: 0.75rem;
        border: 1px solid rgba(255,255,255,0.22);
        border-radius: 12px;
        background: rgba(10, 15, 33, 0.96);
        box-shadow: 0 16px 36px rgba(0,0,0,0.36);
      }
      .deck-settings-option {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        margin-bottom: 0.7rem;
        color: var(--text);
        font-size: 0.9rem;
      }
      .deck-settings-option input {
        margin: 0;
      }
      .deck-settings-divider {
        height: 1px;
        margin: 0.75rem 0;
        background: rgba(255,255,255,0.14);
      }
      .deck-settings-countdown {
        margin-bottom: 0.7rem;
      }
      .deck-settings-countdown-row {
        display: flex;
        align-items: center;
        gap: 0.45rem;
      }
      .deck-settings-countdown-icon {
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1;
      }
      .deck-settings-countdown-thresholds {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        margin-top: 0.42rem;
      }
      .deck-settings-threshold-label {
        color: var(--muted);
        font-size: 0.74rem;
        line-height: 1;
      }
      .deck-settings-threshold-input {
        width: 3.95rem;
        min-width: 0;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 8px;
        background: rgba(255,255,255,0.05);
        color: var(--text);
        padding: 0.3rem 0.38rem;
        font-size: 0.76rem;
        line-height: 1.1;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }
      .deck-settings-threshold-input:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      .deck-settings-countdown-input {
        flex: 1;
        min-width: 7.5rem;
        border: 1px solid rgba(255,255,255,0.24);
        border-radius: 9px;
        background: rgba(255,255,255,0.06);
        color: var(--text);
        padding: 0.48rem 0.62rem;
        font-size: 0.98rem;
        line-height: 1.1;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        letter-spacing: 0.02em;
      }
      .deck-settings-countdown-input:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      .deck-settings-countdown-input.timer-running {
        border-color: rgba(74,222,128,0.88);
        box-shadow: 0 0 0 1px rgba(74,222,128,0.28);
      }
      .deck-settings-countdown-input.timer-running.timer-warning {
        border-color: rgba(250,204,21,0.9);
        box-shadow: 0 0 0 1px rgba(250,204,21,0.34);
      }
      .deck-settings-countdown-input.timer-running.timer-danger {
        border-color: rgba(251,113,133,0.92);
        box-shadow: 0 0 0 1px rgba(251,113,133,0.36);
      }
      .deck-btn--small {
        width: 100%;
        font-size: 0.85rem;
        padding: 0.4rem 0.7rem;
      }
      .deck-settings-icon-btn {
        width: 2.05rem;
        min-width: 2.05rem;
        height: 2.05rem;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        line-height: 1;
      }
      .deck-settings-link-btn {
        border: none;
        background: transparent;
        color: var(--accent);
        padding: 0;
        margin: 0.1rem 0 0.55rem;
        font-size: 0.82rem;
        line-height: 1.2;
        text-decoration: underline;
        text-underline-offset: 2px;
        cursor: pointer;
      }
      .deck-settings-link-btn:hover {
        color: #9cecff;
      }
      .deck-btn--small + .deck-btn--small {
        margin-top: 0.5rem;
      }
      .slide-nav-modal,
      .theme-settings-modal {
        position: fixed;
        inset: 0;
        z-index: 45;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: rgba(3, 6, 14, 0.72);
        backdrop-filter: blur(4px);
      }
      .slide-nav-modal[hidden],
      .theme-settings-modal[hidden] {
        display: none !important;
      }
      .slide-nav-panel {
        width: min(760px, calc(100vw - 2rem));
        max-height: min(78vh, 760px);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 14px;
        background: rgba(10, 15, 33, 0.98);
        box-shadow: 0 20px 44px rgba(0,0,0,0.42);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .slide-nav-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.65rem 0.8rem;
        border-bottom: 1px solid rgba(255,255,255,0.15);
      }
      .slide-nav-title {
        margin: 0;
        font-size: 0.9rem;
        color: var(--muted);
      }
      .slide-nav-list {
        list-style: none;
        margin: 0;
        padding: 0.45rem;
        overflow: auto;
      }
      .theme-settings-panel {
        width: min(520px, calc(100vw - 2rem));
        max-height: min(82vh, 760px);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 14px;
        background: rgba(10, 15, 33, 0.98);
        box-shadow: 0 20px 44px rgba(0,0,0,0.42);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .theme-settings-body {
        padding: 0.75rem 0.85rem;
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.55rem;
        overflow: auto;
      }
      .theme-settings-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.8rem;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px;
        background: rgba(255,255,255,0.03);
        padding: 0.55rem 0.62rem;
      }
      .theme-settings-row-name {
        color: var(--text);
        font-size: 0.86rem;
        line-height: 1.2;
      }
      .theme-settings-row-input {
        width: 2.35rem;
        height: 1.7rem;
        border: 1px solid rgba(255,255,255,0.28);
        border-radius: 6px;
        background: transparent;
        padding: 0;
        cursor: pointer;
      }
      .theme-settings-row-control {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: 0.52rem;
        min-width: 10.5rem;
      }
      .theme-settings-row-input--range {
        width: 7.8rem;
        height: auto;
        border: none;
        border-radius: 0;
        background: transparent;
        padding: 0;
      }
      .theme-settings-row-value {
        min-width: 3.05rem;
        text-align: right;
        color: var(--muted);
        font-size: 0.82rem;
        font-variant-numeric: tabular-nums;
      }
      .theme-settings-footer {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 0.5rem;
        padding: 0.65rem 0.85rem 0.8rem;
        border-top: 1px solid rgba(255,255,255,0.14);
      }
      .slide-nav-item {
        width: 100%;
        border: 1px solid transparent;
        border-radius: 10px;
        background: rgba(255,255,255,0.02);
        color: var(--text);
        cursor: pointer;
        padding: 0.56rem 0.62rem;
        display: flex;
        gap: 0.65rem;
        align-items: baseline;
        text-align: left;
      }
      .slide-nav-item:hover {
        background: rgba(255,255,255,0.08);
        border-color: rgba(255,255,255,0.16);
      }
      .slide-nav-item:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      .slide-nav-item.is-active {
        background: rgba(96,165,250,0.18);
        border-color: rgba(110,231,255,0.42);
      }
      .slide-nav-item-num {
        color: var(--accent);
        font-size: 0.8rem;
        min-width: 3.1rem;
      }
      .slide-nav-item-title {
        color: var(--text);
        font-size: 0.9rem;
      }
      .presenter-shell {
        display: none;
      }
      body.presenter-mode {
        background: var(--presenter-bg);
      }
      body.presenter-mode .deck-shell {
        display: none;
      }
      body.presenter-mode .deck-global-footer {
        display: none !important;
      }
      body.presenter-mode .presenter-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) minmax(180px, 34vh);
        gap: 0.85rem;
        padding: 0.85rem;
      }
      .presenter-topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 12px;
        padding: 0.65rem 0.9rem;
        background: var(--presenter-panel-bg);
      }
      .presenter-title {
        color: var(--muted);
        font-size: 0.92rem;
      }
      .presenter-toolbar {
        display: flex;
        align-items: center;
        gap: 0.55rem;
      }
      .presenter-btn {
        font-size: 0.77rem;
        padding: 0.32rem 0.62rem;
      }
      .presenter-scale-control {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.77rem;
        color: var(--muted);
      }
      .presenter-scale-control input[type="range"] {
        width: 110px;
      }
      .presenter-scale-value {
        min-width: 3.2rem;
        text-align: right;
        color: var(--text);
      }
      .presenter-countdown {
        min-width: 4.3rem;
        text-align: right;
        color: var(--accent);
        font-weight: 700;
        font-size: 0.88rem;
        letter-spacing: 0.03em;
        font-variant-numeric: tabular-nums;
      }
      .presenter-countdown.is-warning {
        color: #facc15;
      }
      .presenter-countdown.is-danger,
      .presenter-countdown.is-complete {
        color: #fb7185;
      }
      body.presenter-mode.presenter-timer-warning .presenter-topbar {
        border-color: rgba(250,204,21,0.68);
        box-shadow: 0 0 0 1px rgba(250,204,21,0.25);
      }
      body.presenter-mode.presenter-timer-danger .presenter-topbar {
        border-color: rgba(251,113,133,0.74);
        background: rgba(58, 13, 24, 0.92);
        box-shadow: 0 0 0 1px rgba(251,113,133,0.28);
      }
      .presenter-counter {
        color: var(--accent);
        font-weight: 600;
        font-size: 0.9rem;
      }
      .presenter-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.85rem;
        min-height: 0;
      }
      body.presenter-mode.presenter-panel-hidden-current .presenter-pane--current,
      body.presenter-mode.presenter-panel-hidden-next .presenter-pane--next,
      body.presenter-mode.presenter-panel-hidden-notes .presenter-notes {
        display: none;
      }
      body.presenter-mode.presenter-panel-hidden-current .presenter-grid,
      body.presenter-mode.presenter-panel-hidden-next .presenter-grid {
        grid-template-columns: 1fr;
      }
      body.presenter-mode.presenter-panel-hidden-current.presenter-panel-hidden-next .presenter-grid {
        display: none;
      }
      body.presenter-mode.presenter-panel-hidden-notes .presenter-shell {
        grid-template-rows: auto minmax(0, 1fr);
      }
      .presenter-pane {
        min-height: 0;
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(255,255,255,0.16);
        border-radius: 12px;
        background: var(--presenter-panel-bg);
        overflow: hidden;
      }
      .presenter-pane-header,
      .presenter-notes-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        padding: 0.55rem 0.75rem;
        border-bottom: 1px solid rgba(255,255,255,0.13);
        background: rgba(255,255,255,0.03);
      }
      .presenter-pane h2,
      .presenter-notes h2 {
        margin: 0;
        padding: 0;
        font-size: 0.82rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .presenter-panel-close-btn {
        font-size: 0.7rem;
        padding: 0.18rem 0.5rem;
        white-space: nowrap;
      }
      .presenter-slide-frame {
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding: 0.8rem;
      }
      .presenter-slide-frame--notes ul {
        margin: 0;
        padding-left: 1.2rem;
      }

  <body>
    <div class="deck-shell">

    <button class="deck-settings-toggle" id="deckSettingsToggle" type="button" aria-controls="deckSettingsPanel" aria-expanded="false">settings</button>

          <button class="deck-btn deck-settings-icon-btn" id="countdownStopBtn" type="button" aria-label="Stop countdown" title="Stop countdown">⏹</button>

            <span class="theme-settings-row-name">Presenter panel background</span>

          <button class="deck-btn presenter-btn" id="themeSettingsDoneBtn" type="button">Done</button>
        </footer>

    <section class="presenter-shell" id="presenterShell" hidden>
      <header class="presenter-topbar">
        <div class="presenter-title">{{ title }} — Presenter view</div>
        <div class="presenter-toolbar">
          <button class="deck-btn presenter-btn" id="presenterResetLayoutBtn" type="button">Reset layout</button>
          <label class="presenter-scale-control" for="presenterScaleRange">
            <span>Scale</span>
            <input id="presenterScaleRange" type="range" min="60" max="140" step="5" value="100" aria-label="Presenter preview scale">
            <span class="presenter-scale-value" id="presenterScaleValue">100%</span>
          </label>
          <div class="presenter-countdown" id="presenterCountdown" hidden>00:00</div>
          <div class="presenter-counter" id="presenterCounter">Slide 1 / 1</div>
        </div>
      </header>
      <div class="presenter-grid">
        <section class="presenter-pane presenter-pane--current">
          <div class="presenter-pane-header">

            <button class="deck-btn presenter-panel-close-btn" type="button" data-close-panel="current" aria-label="Close current panel" title="Close panel">✕</button>
          </div>

        <section class="presenter-pane presenter-pane--next">

            <button class="deck-btn presenter-panel-close-btn" type="button" data-close-panel="next" aria-label="Close next panel" title="Close panel">✕</button>

          <button class="deck-btn presenter-panel-close-btn" type="button" data-close-panel="notes" aria-label="Close notes panel" title="Close panel">✕</button>
        </div>
        <div class="presenter-notes-body" id="presenterNotes"></div>
      </section>
    </section>
    <script>
      (function () {
        const deck = document.getElementById("deck");
        if (!deck) return;
        const STORAGE_SETTINGS_KEY = "markspresso.presentation.settings.v1";
        const STORAGE_STATE_KEY = "markspresso.presentation.state.v1";
        const NOTE_PREFIX_RE = /^(speaker note|speaker notes|speaker tip|demo cue|demo framing|talk track|narration|backup plan)\s*:\s*/i;
        const PRESENTER_SCALE_MIN = 60;
        const PRESENTER_SCALE_MAX = 140;
        const PRESENTER_SCALE_DEFAULT = 100;
        const PRESENTER_SCALE_STEP = 5;
        const COUNTDOWN_DEFAULT_SECONDS = 10 * 60;
        const COUNTDOWN_WARNING_DEFAULT_SECONDS = 5 * 60;
        const COUNTDOWN_DANGER_DEFAULT_SECONDS = 1 * 60;
        const THEME_PENDING_OPACITY_MIN = 20;
        const THEME_PENDING_OPACITY_MAX = 100;
        const THEME_PENDING_OPACITY_STEP = 5;
        const THEME_PENDING_OPACITY_DEFAULT = 70;
        const THEME_COLOR_DEFAULTS = {
          deckBackground: "#0b1020",
          deckGlowLeft: "#1f2a56",
          deckGlowRight: "#17395f",
          presenterBackground: "#050814",
          presenterPanelBackground: "#0a0f21",
          presenterPendingOpacityPercent: THEME_PENDING_OPACITY_DEFAULT
        };
        const THEME_COLOR_CSS_VARIABLES = {
          deckBackground: "--bg",
          deckGlowLeft: "--bg-radial-left",
          deckGlowRight: "--bg-radial-right",
          presenterBackground: "--presenter-bg",
          presenterPanelBackground: "--presenter-panel-bg"
        };
        const isPresenterMode = new URLSearchParams(window.location.search).get("presenter") === "1";
        const sessionId = Math.random().toString(36).slice(2);
        const channelName = "markspresso.presentation." + (window.location.pathname || "/").replace(/[^a-z0-9]/gi, "_");
        const channel = (() => {
          try {
            return typeof BroadcastChannel !== "undefined" ? new BroadcastChannel(channelName) : null;
          } catch (e) {
            return null;
          }
        })();
        const globalFooter = document.querySelector(".deck-global-footer");
        if (globalFooter) {
          const unresolvedFooterToken = String(globalFooter.textContent || "").trim();
          if (/^\{\{\s*globals\.footer\s*\}\}$/i.test(unresolvedFooterToken)) {
            globalFooter.textContent = "";
          }
        }
        function normalizeSlideFooterValue(value) {
          const trimmed = String(value || "").trim();
          if (!trimmed) return "";
          if (/^\{\{\s*[^}]+\s*\}\}$/.test(trimmed)) return "";
          return trimmed;
        }
        function escapeHtml(value) {
          return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }
        function renderSlideFooterMarkup(value) {
          const normalized = normalizeSlideFooterValue(value);
          if (!normalized || /^none$/i.test(normalized)) return "";
          if (/<[a-z][\s\S]*>/i.test(normalized)) {
            return normalized;
          }
          return escapeHtml(normalized).replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (match, label, href) => {
            return `<a href="${href}" target="_blank" rel="noopener noreferrer">${label}</a>`;
          });
        }
        function extractSlideFooterDirective(slideHtml) {
          let hasDirective = false;
          let footerValue = "";
          const html = String(slideHtml || "").replace(/<!--\s*slide-footer\s*:\s*([\s\S]*?)-->/gi, (match, value) => {
            hasDirective = true;
            footerValue = String(value || "").trim();
            return "";
          });
          return { html: html.trim(), hasDirective, footerValue };
        }
        function readSlidesFooterDefault() {
          const templateIds = [
            "slidesFooterDefaultCamel",
            "slidesFooterDefaultSnake",
            "slidesFooterDefaultKebab"
          ];
          for (const templateId of templateIds) {
            const template = document.getElementById(templateId);
            if (!template) continue;
            const normalizedValue = normalizeSlideFooterValue(template.innerHTML);
            if (normalizedValue) return normalizedValue;
          }
          return "";
        }
        const raw = deck.innerHTML;
        const parts = raw.split(/<hr\b[^>]*>/i).map(s => s.trim()).filter(Boolean);
        const sourceSlides = parts.length ? parts : [raw];
        const defaultSlidesFooter = readSlidesFooterDefault();
        const preparedSlides = sourceSlides.map((slideHtml) => {
          const extracted = extractSlideFooterDirective(slideHtml);
          const footerSource = extracted.hasDirective ? extracted.footerValue : defaultSlidesFooter;
          return {
            html: extracted.html,
            footerHtml: renderSlideFooterMarkup(footerSource)
          };
        });
        const slideIdWidth = Math.max(2, String(preparedSlides.length || 1).length);
        function formatSlideId(slideIndex) {
          return `slide${String(slideIndex + 1).padStart(slideIdWidth, "0")}`;
        }
        const slidesHtml = preparedSlides.map((slideData, idx) => {
          const slideId = formatSlideId(idx);
          const footerMarkup = slideData.footerHtml
            ? `<div class="slide-footer">${slideData.footerHtml}</div>`
            : "";
          return `<section class="slide${idx === 0 ? " active" : ""}" id="${slideId}" data-slide="${idx + 1}">${slideData.html}${footerMarkup}</section>`;
        }).join("");
        deck.innerHTML = slidesHtml;
        const slides = Array.from(deck.querySelectorAll(".slide"));
        function getTwoColVariantClass(hasLeft40Marker, hasRight40Marker) {
          return hasLeft40Marker
            ? "slide-two-col slide-two-col--left-40"
            : (hasRight40Marker ? "slide-two-col slide-two-col--right-40" : "slide-two-col");
        }

        function applyTwoColCodeLayout(slide) {
          const hasDefaultMarker = /<!--\s*two-col-code\s*-->/i.test(slide.innerHTML);
          const hasRight40Marker = /<!--\s*two-col-code-right-40\s*-->/i.test(slide.innerHTML);
          const hasLeft40Marker = /<!--\s*two-col-code-left-40\s*-->/i.test(slide.innerHTML);
          if (!hasDefaultMarker && !hasRight40Marker && !hasLeft40Marker) return false;
          slide.innerHTML = slide.innerHTML
            .replace(/<!--\s*two-col-code\s*-->/gi, "")
            .replace(/<!--\s*two-col-code-right-40\s*-->/gi, "")
            .replace(/<!--\s*two-col-code-left-40\s*-->/gi, "");
          const pre = slide.querySelector("pre");
          if (!pre) return false;
          const codeNode = (pre.parentElement && pre.parentElement !== slide && pre.parentElement.parentElement === slide && pre.parentElement.children.length === 1)
            ? pre.parentElement
            : pre;
          const wrapper = document.createElement("div");
          wrapper.className = getTwoColVariantClass(hasLeft40Marker, hasRight40Marker);
          const textCol = document.createElement("div");
          textCol.className = "slide-two-col__left slide-two-col__text";
          const codeCol = document.createElement("div");
          codeCol.className = "slide-two-col__right slide-two-col__code";
          const nodes = Array.from(slide.childNodes);
          for (const node of nodes) {
            if (node === codeNode) continue;
            textCol.appendChild(node);
          }
          codeCol.appendChild(codeNode);
          wrapper.appendChild(textCol);
          wrapper.appendChild(codeCol);
          slide.appendChild(wrapper);
          return true;
        }

        function isColumnBreakComment(node) {
          if (!node || node.nodeType !== Node.COMMENT_NODE) return false;
          return /^(?:\s*(?:col-break|two-col-break|column-break|col-right|right-col)\s*)$/i.test(node.nodeValue || "");
        }

        function findPreferredSimpleSplitIndex(nodes) {
          const mediaSelector = "img, picture, figure, video, iframe, pre, table";
          for (let i = 0; i < nodes.length; i += 1) {
            const node = nodes[i];
            if (!node || node.nodeType !== Node.ELEMENT_NODE) continue;
            if (
              (node.matches && node.matches(mediaSelector)) ||
              (node.querySelector && node.querySelector(mediaSelector))
            ) {
              return i;
            }
          }
          return -1;
        }

        function applyTwoColSimpleLayout(slide) {
          const hasDefaultMarker = /<!--\s*two-col\s*-->/i.test(slide.innerHTML);
          const hasRight40Marker = /<!--\s*two-col-right-40\s*-->/i.test(slide.innerHTML);
          const hasLeft40Marker = /<!--\s*two-col-left-40\s*-->/i.test(slide.innerHTML);
          if (!hasDefaultMarker && !hasRight40Marker && !hasLeft40Marker) return false;

          slide.innerHTML = slide.innerHTML
            .replace(/<!--\s*two-col\s*-->/gi, "")
            .replace(/<!--\s*two-col-right-40\s*-->/gi, "")
            .replace(/<!--\s*two-col-left-40\s*-->/gi, "");

          const wrapper = document.createElement("div");
          wrapper.className = getTwoColVariantClass(hasLeft40Marker, hasRight40Marker);
          const leftCol = document.createElement("div");
          leftCol.className = "slide-two-col__left";
          const rightCol = document.createElement("div");
          rightCol.className = "slide-two-col__right";

          const nodes = Array.from(slide.childNodes);
          const breakIndex = nodes.findIndex((node) => isColumnBreakComment(node));
          if (breakIndex >= 0) {
            nodes.forEach((node, nodeIndex) => {
              if (nodeIndex === breakIndex) return;
              (nodeIndex < breakIndex ? leftCol : rightCol).appendChild(node);
            });
          } else {
            const contentNodes = nodes.filter((node) => {
              if (node.nodeType === Node.COMMENT_NODE) {
                return !!(node.nodeValue || "").trim();
              }
              if (node.nodeType === Node.TEXT_NODE) {
                return !!(node.textContent || "").trim();
              }
              return true;
            });
            if (!contentNodes.length) return false;
            let splitAt = findPreferredSimpleSplitIndex(contentNodes);
            if (splitAt < 1 || splitAt >= contentNodes.length) {
              splitAt = Math.ceil(contentNodes.length / 2);
            }
            contentNodes.forEach((node, nodeIndex) => {
              (nodeIndex < splitAt ? leftCol : rightCol).appendChild(node);
            });
          }

          wrapper.appendChild(leftCol);
          wrapper.appendChild(rightCol);
          slide.appendChild(wrapper);
          return true;
        }

        function setAutoCodeFragment(node, shouldEnable) {
          if (!node) return;
          const AUTO_FRAGMENT_ATTR = "data-auto-fragment";
          if (shouldEnable) {
            if (!node.classList.contains("fragment")) {
              node.classList.add("fragment");
              node.setAttribute(AUTO_FRAGMENT_ATTR, "1");
            }
            node.classList.add("fragment-auto-code");
            return;
          }
          if (!node.classList.contains("fragment-auto-code")) return;
          node.classList.remove("fragment-auto-code");
          if (node.getAttribute(AUTO_FRAGMENT_ATTR) === "1") {
            node.classList.remove("fragment");
            node.removeAttribute(AUTO_FRAGMENT_ATTR);
          }
        }

        function hasRevealableBulletTargets(root) {
          if (!root) return false;
          return Array.from(root.querySelectorAll("li, .fragment")).some((el) => {
            if (el.classList.contains("fragment-auto-code")) return false;
            return !el.closest(".speaker-note");
          });
        }

        function markDeferredCodeFragments(slide) {
          const twoColWrappers = Array.from(slide.querySelectorAll(".slide-two-col"));
          twoColWrappers.forEach((wrapper) => {
            const textCol = wrapper.querySelector(".slide-two-col__text");
            const codeCol = wrapper.querySelector(".slide-two-col__code");
            if (!textCol || !codeCol) return;
            setAutoCodeFragment(codeCol, hasRevealableBulletTargets(textCol));
          });

          const preBlocks = Array.from(slide.querySelectorAll("pre"));
          preBlocks.forEach((pre) => {
            if (pre.closest(".speaker-note")) return;
            if (pre.closest(".slide-two-col__code")) return;
            if (pre.closest("li")) return;

            const revealNode = (pre.parentElement && pre.parentElement !== slide && pre.parentElement.children.length === 1 && !pre.parentElement.closest("li"))
              ? pre.parentElement
              : pre;

            const revealTargets = Array.from(slide.querySelectorAll("li, .fragment")).filter((el) => {
              if (el === revealNode) return false;
              if (el.classList.contains("fragment-auto-code")) return false;
              return !el.closest(".speaker-note");

            if (["Enter", " "].includes(e.key)) {
              e.preventDefault();
              jumpToSelectedSlide();
              return;
            }
            if (["s", "S", "n", "N"].includes(e.key)) {
              e.preventDefault();
              closeSlideNavigator();
              return;
            }
            return;
          }
          if (isTypingContext(e)) return;
          if (["s", "S", "n", "N"].includes(e.key)) {
            e.preventDefault();
            toggleSlideNavigator();
            return;
          }
          if (["ArrowRight", "PageDown", " "].includes(e.key)) { e.preventDefault(); next(); }
          if (["ArrowLeft", "PageUp"].includes(e.key)) { e.preventDefault(); prev(); }
          if (e.key === "Escape") {
            hideSettingsPanel();
            closeThemeSettingsModal();
            closeSlideNavigator();
          }
        });

        if (isPresenterMode) {
          document.body.classList.add("presenter-mode");
          if (presenterShell) {
            presenterShell.hidden = false;
          }
          hideSettingsPanel();
          setPresenterPanelVisibility("current", presenterCurrentPane, { skipSave: true, skipRender: true });
          setPresenterPanelVisibility("next", presenterNextPane, { skipSave: true, skipRender: true });
          setPresenterPanelVisibility("notes", presenterNotesPane, { skipSave: true, skipRender: true });
          try {
            const lastMessage = JSON.parse(localStorage.getItem(STORAGE_STATE_KEY) || "{}");
            if (lastMessage.state) {
              applyIncomingState(lastMessage.state);
            }
          } catch (e) {
            // Ignore parse failures.
          }
          broadcast("request-state");
        } else if (presenterShell) {
          presenterShell.hidden = true;
          document.body.classList.remove(
            "presenter-panel-hidden-current",
            "presenter-panel-hidden-next",
            "presenter-panel-hidden-notes"
          );
        }

        render({ broadcastState: !isPresenterMode });
      })();
    </script>
  </body>
</html>
