<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} · Markspresso</title>
    <style>
      :root { color-scheme: light dark; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.6; }
      .container { max-width: 980px; margin: 0 auto; padding: 1rem; }
      .layout { display: grid; grid-template-columns: 260px 1fr; gap: 2rem; }
      .sidebar { font-size: 0.95rem; }
      .content { min-width: 0; }
      .content pre { overflow: auto; }
      .navigation { position: sticky; top: 1rem; }
      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    {{ include "partials/header.html" }}
    <main class="container layout">
      <aside class="sidebar">
        <div class="navigation">
          {{ navigation }}
        </div>
      </aside>
      <article class="content">
        <h1>{{ title }}</h1>
        {{ content }}
      </article>
    </main>
    {{ include "partials/footer.html" }}
    {{ markspressoScripts }}
  </body>
</html>
