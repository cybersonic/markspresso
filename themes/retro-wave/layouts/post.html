<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} · Markspresso</title>
    <link rel="stylesheet" href="/theme-assets/retro-wave/css/retro.css">
  </head>
  <body>
    {{ include "partials/header.html" }}
    <main class="retro-shell">
      <article class="retro-main body-copy">
        <h1>{{ title }}</h1>
        {{#if date}}<p class="stamp">{{ date }}</p>{{/if}}
        {{ content }}
      </article>
      <aside class="retro-side">
        <h2>recent</h2>
        {{ posts_list }}
      </aside>
    </main>
    {{ include "partials/footer.html" }}
    {{ markspressoScripts }}
  </body>
</html>
