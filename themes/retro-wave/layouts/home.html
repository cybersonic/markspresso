<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} · Markspresso</title>
    <link rel="stylesheet" href="/theme-assets/retro-wave/css/retro.css">
  </head>
  <body>
    {{ include "partials/header.html" }}
    <section class="retro-single hero">
      <h1 class="hero-title">{{ title }}</h1>
      {{#if description}}<p class="lede hero-lede">{{ description }}</p>{{/if}}
    </section>
    <main class="retro-single body-copy">
      {{ content }}
    </main>
    {{ include "partials/footer.html" }}
    {{ markspressoScripts }}
  </body>
</html>
