<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} · Markspresso</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="/css/page.css" rel="stylesheet">
  </head>
  <body class="post-page">
    <div class="site-shell">
      {{ include "partials/header.html" }}
      <main class="container post-layout">
        <article class="post-article">
          <p class="post-kicker">Markspresso Brew Log</p>
          <h1 class="post-title">{{ title }}</h1>
          {{#if date}}
          <p class="post-date">{{ date }}</p>
          {{/if}}
          <div class="post-content">
            {{ content }}
          </div>
        </article>
        <aside class="post-aside">
          <div class="post-aside-card">
            <h2 class="post-aside-title">Recent posts</h2>
            {{ posts_list }}
          </div>
        </aside>
      </main>
      {{ include "partials/footer.html" }}
    </div>
    <script>
      (function() {
        var storageKey = 'markspresso-theme';
        var root = document.documentElement;

        function applyTheme(theme) {
          if (!theme) return;
          root.setAttribute('data-theme', theme);
          try { localStorage.setItem(storageKey, theme); } catch (e) {}
        }

        function getStoredTheme() {
          try { return localStorage.getItem(storageKey); } catch (e) { return null; }
        }

        var stored = getStoredTheme();
        if (stored === 'light' || stored === 'dark') {
          applyTheme(stored);
        } else {
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          applyTheme(prefersDark ? 'dark' : 'light');
        }

        window.markspressoToggleTheme = function() {
          var current = root.getAttribute('data-theme') || 'light';
          var next = current === 'light' ? 'dark' : 'light';
          applyTheme(next);
        };
      })();
    </script>
    {{ markspressoScripts }}
  </body>
</html>
