name: Build and release markspresso binary

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout markspresso repo
        uses: actions/checkout@v4
        with:
          path: markspresso

      - name: Checkout LuCLI (feature/white-label-branding)
        uses: actions/checkout@v4
        with:
          repository: cybersonic/LuCLI
          ref: feature/white-label-branding
          path: LuCLI

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: LuCLI/pom.xml

      - name: Build markspresso binary
        run: |
          MARKSPRESSO_DIR="$GITHUB_WORKSPACE/markspresso" \
          LUCLI_DIR="$GITHUB_WORKSPACE/LuCLI" \
          bash "$GITHUB_WORKSPACE/markspresso/devops/build-binary.sh"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: markspresso-linux-amd64
          path: LuCLI/target/markspresso

      - name: Create GitHub release and upload binary
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: LuCLI/target/markspresso
